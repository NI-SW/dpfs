syntax = "proto3";

package dpfsgrpc;

/*
  * SysCtl service definition
  * This service provides system control operations, such as login, logoff, execSQL, getTableHandle, getIdxIter, etc.
  * The service is implemented by the server and called by the client through gRPC.
*/
service SysCtl {
  // 登录，返回登录结果和用户句柄
  rpc Login(LoginReq) returns (LoginReply) {}

  // 注销登录用户
  rpc Logoff(LogoffReq) returns (OperateReply) {}

  // 输入SQL语句，返回执行结果
  rpc ExecSQL (Exesql) returns (OperateReply) {}
  // 返回整表信息 ：： CCollection::m_cltInfoCache中的zptr指针指向的内容, 客户端直接使用CCollection::collectionStruct加载表信息
  rpc GetTableHandle  (GetTableRequest) returns (GetTableReply) {}
  // 传入要插入的数据，返回执行结果
  rpc InsertTable     (InsertRequest) returns (OperateReply) {}
  // 传入主键，返回一行数据
  rpc GetRow          (GetRowRequest) returns (GetRowReply) {}
  // 传入索引列名和值，返回检索迭代器
  rpc GetIdxIter      (GetIdxIterReq) returns (GetIdxIterReply) {}
  // 传入迭代器标识，释放服务器端的迭代器资源
  rpc ReleaseIdxIter   (ReleaseIdxIterReq) returns (OperateReply) {}

  // 继续向后获取结果集
  // rpc nextRowSets () returns () {}
  // 继续向前获取结果集
  // rpc prevRowSets () returns () {}

  // 传入要删除的行，返回执行结果
  // rpc deleteItem      (htable) returns (operateReply) {}
  // 输入表名，删除表
  // rpc dropTable       (htable) returns (operateReply) {}
}

message LoginReq {
  string username = 1;
  string password = 2;
}

message LoginReply {
  int32 rc = 1;
  int32 husr = 2;
  string msg = 3;
}
message LogoffReq {
  int32 husr = 1;
}


message Exesql {
  int32 husr = 1;
  string sql = 2;
}

message OperateReply {
  int32 rc = 1;
  string msg = 2;
}

// The request message containing the user's name.
message GetTableRequest {
  int32 husr = 1;
  string schema_name = 2;
  string table_name = 3;
}


// The response message containing the greetings
message GetTableReply {
  bytes table_handle = 1;
  int32 rc = 2;
  string msg = 3;
  // m_cltInfoCache中的zptr指针指向的内容
  bytes table_infos = 4;
}

message GetRowRequest {
  // table bidx
  int32 husr = 1;
  string schema_name = 2;
  string tab_name = 3;
  bytes key_val = 4;
}

message GetRowReply {
  // return code
  int32 rc = 1;

  // return message
  string msg = 2;

  // row data, copy to CItem's m_ptr 
  bytes row_data = 3;
}

message InsertRequest {
  int32 husr = 1;
  bytes table_handle = 2;
  // fullfile CItem's rowNumber
  uint32 row_number = 3;
  // copy to CItem's m_ptr 
  bytes row_data = 4;
}

message GetIdxIterReq {
  int32 husr = 1;
  bytes table_handle = 2;
  repeated string col_names = 3;
  repeated bytes key_vals = 4;
}

message GetIdxIterReply {
  int32 rc = 1;
  string msg = 2;
  // idxIterIdentifier, used to identify the iterator on the server side, and used for subsequent data I/O operations on this table, such as query, etc.
  int32 hidx = 3;
}

message GetNextRowSetsReqs {
  int32 rc = 1;
  int32 husr = 2;
  int32 hidx = 3;
}

message ReleaseIdxIterReq {
  int32 rc = 1;
  int32 husr = 2;
  int32 hidx = 3;
}


/*
protoc -I . --grpc_out=. --plugin=protoc-gen-grpc=`which grpc_cpp_plugin` sysrpc.proto
protoc -I . --cpp_out=. sysrpc.proto
*/